<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Body Mass Index Calculator</h1>
        <p class="subtitle">Quickly check your BMI using age, gender, height, and weight.</p>

        <form id="bmiForm">
          <label for="age">Age</label>
          <input id="age" name="age" type="number" min="1" max="120" placeholder="Enter age" required />

          <label>Gender</label>
          <div class="gender-row">
            <label class="option">
              <input type="radio" name="gender" value="Female" />
              <span>Female</span>
            </label>
            <label class="option">
              <input type="radio" name="gender" value="Male" />
              <span>Male</span>
            </label>
            <label class="option">
              <input type="radio" name="gender" value="Other" />
              <span>Other</span>
            </label>
          </div>

          <label for="height">Height (cm)</label>
          <input id="height" name="height" type="number" min="50" max="300" placeholder="e.g. 170" required />

          <label for="weight">Weight (kg)</label>
          <input id="weight" name="weight" type="number" min="20" max="500" placeholder="e.g. 65" required />

          <button type="submit">Calculate BMI</button>
        </form>

        <section id="result" class="result" aria-live="polite">
          <h2>Your result will appear here</h2>
          <p>Fill in the form and press the button to get started.</p>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
